<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ED-CCT</title>

<style>
body{
margin:0;
background:#0b0f1a;
color:#e6edf3;
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
text-align:center;
}

.container{max-width:900px;padding:40px;}

h1{color:#ff9800;font-size:48px;}
h2{color:#9fb3c8;font-weight:normal;}

.card{
margin-top:25px;
padding:25px;
border:1px solid #253041;
border-radius:12px;
background:#111827;
}

input{
width:100%;
padding:12px;
margin-top:10px;
background:#1b2535;
border:none;
color:white;
border-radius:8px;
}

button{
margin-top:15px;
padding:12px 18px;
border:none;
border-radius:8px;
cursor:pointer;
background:#ff9800;
font-weight:bold;
}

.secondary{background:#253041;color:white;}

.hidden{display:none;}

.status{margin-top:15px;color:#ff9800;}

.small{color:#9fb3c8;font-size:14px;}

pre{
text-align:left;
background:#0b0f1a;
padding:15px;
border-radius:8px;
overflow:auto;
}

.box{
padding:12px;
margin-top:10px;
background:#0b0f1a;
border-radius:8px;
border:1px solid #1f2a3a;
}

.event{
margin-top:10px;
padding:10px;
background:#111827;
border:1px solid #253041;
border-radius:8px;
}

.event h5{
margin:0 0 10px 0;
color:#ff9800;
}

.event-row{
margin:4px 0;
font-size:14px;
}
</style>
</head>

<body>

<div class="container">

<h1>ED-CCT</h1>
<h2>Elite Dangerous Tracker</h2>

<div id="authBox" class="card">
<h3>Login / Register</h3>

<input id="email" placeholder="Email"/>
<input id="password" type="password" placeholder="Password"/>

<button onclick="register()">Register</button>
<button class="secondary" onclick="login()">Login</button>

<div id="authStatus" class="status"></div>
</div>

<div id="dashboard" class="card hidden">

<h3>Commander Dashboard</h3>

<p id="userEmail" class="small"></p>

<p id="frontierStatus">Checking Frontier...</p>

<button onclick="connectFrontier()">Connect Frontier</button>
<button class="secondary" onclick="logout()">Logout</button>

<div id="dashStatus" class="status"></div>
</div>

<div id="profileBox" class="card hidden">

<h3>Frontier Data</h3>

<pre id="journalData">Loading...</pre>

<div id="profileUI"></div>

</div>

</div>

<script>

const API = "https://elite-oauth.edcolonycommoditiestracker.workers.dev";

let session = null;

async function init(){
session = sessionStorage.getItem("auth_session");
if(!session) return;
await loadDashboard();
await loadProfile();
}
init();

async function loadDashboard(){
const res = await fetch(API + "/me?session=" + session);
if(!res.ok) return;

const data = await res.json();
if(!data.logged) return;

document.getElementById("authBox").classList.add("hidden");
document.getElementById("dashboard").classList.remove("hidden");

document.getElementById("userEmail").innerText =
"Logged as: " + data.email;

document.getElementById("frontierStatus").innerText =
data.frontier ? "Frontier: CONNECTED ✔" : "Frontier: NOT CONNECTED ✖";
}

async function loadProfile(){

const res = await fetch(API + "/data?session=" + session);
if(!res.ok) return;

const data = await res.json();

const j = data.journal || [];

document.getElementById("profileBox").classList.remove("hidden");

document.getElementById("journalData").innerText =
JSON.stringify(j, null, 2);

document.getElementById("profileUI").innerHTML =
renderEvents(j);
}

// tylko ostatnie wystąpienie każdego eventu
function getLatestOnly(events){

const wanted = ["LoadGame","Loadout","Cargo"];
const latest = {};

for(const e of events){
if(!e || !wanted.includes(e.event)) continue;
latest[e.event] = e;
}

return latest;
}

function renderEvents(events){

const latest = getLatestOnly(events);

const loadGame = latest.LoadGame || {};
const loadout = latest.Loadout || {};
const cargo = latest.Cargo || {};

return `

<div class="box">
<h4>LoadGame</h4>
<p><b>Commander:</b> ${loadGame.Commander ?? "-"}</p>
<p><b>Ship:</b> ${loadGame.Ship_Localised ?? "-"}</p>
<p><b>Fuel:</b> ${loadGame.FuelLevel ?? 0} / ${loadGame.FuelCapacity ?? 0}</p>
</div>

<div class="box">
<h4>Loadout</h4>
<p><b>Ship Ident:</b> ${loadout.ShipIdent ?? "-"}</p>
<p><b>Hull:</b> ${loadout.HullValue ?? 0}</p>
<p><b>Modules:</b> ${loadout.ModulesValue ?? 0}</p>
<p><b>Cargo Capacity:</b> ${loadout.CargoCapacity ?? 0}</p>
<p><b>Max Jump:</b> ${loadout.MaxJumpRange ?? 0}</p>
</div>

<div class="box">
<h4>Cargo</h4>
<p><b>Vessel:</b> ${cargo.Vessel ?? "-"}</p>
<p><b>Count:</b> ${cargo.Count ?? 0}</p>
</div>

`;

}

// auth / login / register / frontier / logout

async function register(){
const email = document.getElementById("email").value.trim().toLowerCase();
const password = document.getElementById("password").value;

const res = await fetch(API + "/register",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({email,password})
});

const data = await res.json();
document.getElementById("authStatus").innerText =
data.error || "Account created ✔";
}

async function login(){
const email = document.getElementById("email").value.trim().toLowerCase();
const password = document.getElementById("password").value;

const res = await fetch(API + "/login",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({email,password})
});

const data = await res.json();

if(data.error){
document.getElementById("authStatus").innerText = data.error;
return;
}

sessionStorage.setItem("auth_session",data.session);
session = data.session;

await loadDashboard();
await loadProfile();
}

async function connectFrontier(){
const res = await fetch(API + "/frontier/start",{
headers:{Authorization:"Bearer " + session}
});

const data = await res.json();

if(data.error){
document.getElementById("dashStatus").innerText = data.error;
return;
}

location.href = data.url;
}

function logout(){
sessionStorage.removeItem("auth_session");
location.reload();
}

</script>

</body>
</html>
