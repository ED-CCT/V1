<script>
const API =
"https://elite-oauth.edcolonycommoditiestracker.workers.dev";

let session = null;

// ================= INIT =================

async function init(){

  session =
    sessionStorage.getItem("auth_session");

  if(!session)
    return;

  await loadDashboard();
}

init();

// ================= DASHBOARD =================

async function loadDashboard(){

  const res = await fetch(
    API + "/me",
    {
      headers:{
        Authorization:
          "Bearer " + session
      }
    }
  );

  if(!res.ok)
    return;

  const data = await res.json();

  if(!data.logged)
    return;

  document
    .getElementById("authBox")
    .classList.add("hidden");

  document
    .getElementById("dashboard")
    .classList.remove("hidden");

  document
    .getElementById("userEmail")
    .innerText =
      "Logged as: " + data.email;

  document
    .getElementById("frontierStatus")
    .innerText =
      data.frontier
      ? "Frontier: CONNECTED ✔"
      : "Frontier: NOT CONNECTED ✖";

  if(data.frontier){
    await loadProfile();
  }
}

// ================= PROFILE =================

async function loadProfile(){

  const res = await fetch(
    API + "/data",
    {
      headers:{
        Authorization:
          "Bearer " + session
      }
    }
  );

  if(!res.ok)
    return;

  const data = await res.json();

  document
    .getElementById("profileBox")
    .classList.remove("hidden");

  document
    .getElementById("profileUI")
    .innerHTML =
      "<pre>" +
      JSON.stringify(data,null,2) +
      "</pre>";
}

// ================= REGISTER =================

async function register(){

  const email =
    document
    .getElementById("email")
    .value
    .trim()
    .toLowerCase();

  const password =
    document
    .getElementById("password")
    .value;

  const res = await fetch(
    API + "/register",
    {
      method:"POST",
      headers:{
        "Content-Type":"application/json"
      },
      body:JSON.stringify({
        email,
        password
      })
    }
  );

  const data = await res.json();

  document
    .getElementById("authStatus")
    .innerText =
      data.error ||
      "Account created ✔";
}

// ================= LOGIN =================

async function login(){

  const email =
    document
    .getElementById("email")
    .value
    .trim()
    .toLowerCase();

  const password =
    document
    .getElementById("password")
    .value;

  const res = await fetch(
    API + "/login",
    {
      method:"POST",
      headers:{
        "Content-Type":"application/json"
      },
      body:JSON.stringify({
        email,
        password
      })
    }
  );

  const data = await res.json();

  if(data.error){

    document
      .getElementById("authStatus")
      .innerText = data.error;

    return;
  }

  session = data.session;

  sessionStorage.setItem(
    "auth_session",
    session
  );

  await loadDashboard();
}

// ================= FRONTIER =================

async function connectFrontier(){

  const res = await fetch(
    API + "/frontier/start",
    {
      headers:{
        Authorization:
          "Bearer " + session
      }
    }
  );

  const data = await res.json();

  if(data.error){

    document
      .getElementById("dashStatus")
      .innerText = data.error;

    return;
  }

  location.href = data.url;
}

// ================= MANUAL =================

async function ManualColonisationSystemClaimSynch(){

  const res = await fetch(
    API + "/ManualColonisationSystemClaimSynch",
    {
      headers:{
        Authorization:
          "Bearer " + session
      }
    }
  );

  const data = await res.json();

  document
    .getElementById("manual")
    .innerText =
      JSON.stringify(data,null,2);
}

// ================= LOGOUT =================

async function logout(){

  await fetch(
    API + "/logout",
    {
      method:"POST",
      headers:{
        Authorization:
          "Bearer " + session
      }
    }
  );

  sessionStorage.removeItem(
    "auth_session"
  );

  location.reload();
}
</script>
