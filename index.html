<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ED-CCT</title>

<style>

body{
margin:0;
background:#0b0f1a;
color:#e6edf3;
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
text-align:center;
}

.container{
max-width:900px;
padding:40px;
width:100%;
}

h1{
color:#ff9800;
font-size:48px;
}

h2{
color:#9fb3c8;
font-weight:normal;
}

.card{
margin-top:25px;
padding:25px;
border:1px solid #253041;
border-radius:12px;
background:#111827;
}

input{
width:100%;
padding:12px;
margin-top:10px;
background:#1b2535;
border:none;
color:white;
border-radius:8px;
box-sizing:border-box;
}

button{
margin-top:15px;
padding:12px 18px;
border:none;
border-radius:8px;
cursor:pointer;
background:#ff9800;
font-weight:bold;
}

.secondary{
background:#253041;
color:white;
}

.hidden{
display:none;
}

.status{
margin-top:15px;
color:#ff9800;
}

.small{
color:#9fb3c8;
font-size:14px;
}

pre{
text-align:left;
background:#0b0f1a;
padding:15px;
border-radius:8px;
overflow:auto;
max-height:500px;
}

.flex{
display:flex;
gap:15px;
flex-wrap:wrap;
}

.half{
flex:1;
min-width:300px;
text-align:left;
}

.box{
padding:12px;
margin-top:10px;
background:#0b0f1a;
border-radius:8px;
border:1px solid #1f2a3a;
}

</style>
</head>

<body>

<div class="container">

<h1>ED-CCT</h1>
<h2>Elite Dangerous Tracker</h2>

<!-- LOGIN -->
<div id="authBox" class="card">

<h3>Login / Register</h3>

<input id="email" placeholder="Email"/>
<input id="password" type="password" placeholder="Password"/>

<button onclick="register()">Register</button>
<button class="secondary" onclick="login()">Login</button>

<div id="authStatus" class="status"></div>

</div>

<!-- DASHBOARD -->
<div id="dashboard" class="card hidden">

<h3>Commander Dashboard</h3>

<p id="userEmail" class="small"></p>

<p id="frontierStatus">Checking Frontier...</p>

<button onclick="connectFrontier()">
Connect Frontier
</button>

<button class="secondary" onclick="logout()">
Logout
</button>

<div id="dashStatus" class="status"></div>

</div>

<!-- PROFILE -->
<div id="profileBox" class="card hidden">

<h3>Latest Journal Events</h3>

<div class="flex">

<!-- RAW -->
<div class="half">

<h4>Raw JSON</h4>

<pre id="journalData">Loading...</pre>

</div>

<!-- UI -->
<div class="half">

<h4>Structured View</h4>

<div id="profileUI"></div>

</div>

</div>

</div>

</div>

<script>

const API =
"https://elite-oauth.edcolonycommoditiestracker.workers.dev";

let session = null;


// =========================
// INIT
// =========================

async function init(){

session = sessionStorage.getItem("auth_session");

if(!session) return;

await loadDashboard();
await loadProfile();
}

init();


// =========================
// DASHBOARD
// =========================

async function loadDashboard(){

const res =
await fetch(API + "/me?session=" + session);

if(!res.ok) return;

const data = await res.json();

if(!data.logged) return;

document.getElementById("authBox")
.classList.add("hidden");

document.getElementById("dashboard")
.classList.remove("hidden");

document.getElementById("userEmail").innerText =
"Logged as: " + data.email;

document.getElementById("frontierStatus").innerText =
data.frontier
? "Frontier: CONNECTED ✔"
: "Frontier: NOT CONNECTED ✖";
}


// =========================
// PROFILE
// =========================

async function loadProfile(){

const res =
await fetch(API + "/data?session=" + session);

if(!res.ok) return;

const data = await res.json();

// journal musi być tablicą eventów
const j = data.journal || [];

document.getElementById("profileBox")
.classList.remove("hidden");

// RAW JSON
document.getElementById("journalData").innerText =
JSON.stringify(j, null, 2);

// GUI
document.getElementById("profileUI").innerHTML =
renderLatestEvents(j);
}


// =========================
// GET LATEST EVENTS
// =========================

function getLatestEvents(events){

if(!Array.isArray(events)) return {};

const latest = {};

for(const ev of events){

if(!ev.event) continue;

// zawsze nadpisujemy
// dzięki temu zostaje ostatni event
latest[ev.event] = ev;
}

return latest;
}


// =========================
// RENDER EVENTS
// =========================

function renderLatestEvents(events){

const latest = getLatestEvents(events);

return Object.values(latest)
.map(ev => {


// =========================
// LOADGAME
// =========================

if(ev.event === "LoadGame"){

return `

<div class="box">

<h4>LoadGame</h4>

<p><b>Commander:</b>
${ev.Commander ?? "-"}
</p>

<p><b>Ship:</b>
${ev.Ship_Localised ?? "-"}
</p>

<p><b>Fuel Level:</b>
${ev.FuelLevel ?? 0}
</p>

<p><b>Fuel Capacity:</b>
${ev.FuelCapacity ?? 0}
</p>

<p><b>Timestamp:</b>
${ev.timestamp ?? "-"}
</p>

</div>

`;
}


// =========================
// LOADOUT
// =========================

if(ev.event === "Loadout"){

return `

<div class="box">

<h4>Loadout</h4>

<p><b>Ship Ident:</b>
${ev.ShipIdent ?? "-"}
</p>

<p><b>Hull Value:</b>
${Number(
ev.HullValue ?? 0
).toLocaleString()}
</p>

<p><b>Modules Value:</b>
${Number(
ev.ModulesValue ?? 0
).toLocaleString()}
</p>

<p><b>Cargo Capacity:</b>
${ev.CargoCapacity ?? 0}
</p>

<p><b>Max Jump Range:</b>
${ev.MaxJumpRange ?? 0}
</p>

<p><b>Timestamp:</b>
${ev.timestamp ?? "-"}
</p>

</div>

`;
}


// =========================
// CARGO
// =========================

if(ev.event === "Cargo"){

return `

<div class="box">

<h4>Cargo</h4>

<p><b>Vessel:</b>
${ev.Vessel ?? "-"}
</p>

<p><b>Count:</b>
${ev.Count ?? 0}
</p>

<p><b>Timestamp:</b>
${ev.timestamp ?? "-"}
</p>

</div>

`;
}

return "";

})
.join("");
}


// =========================
// REGISTER
// =========================

async function register(){

const email =
document.getElementById("email")
.value
.trim()
.toLowerCase();

const password =
document.getElementById("password")
.value;

const res =
await fetch(API + "/register",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
email,
password
})

});

const data = await res.json();

document.getElementById("authStatus").innerText =
data.error || "Account created ✔";
}


// =========================
// LOGIN
// =========================

async function login(){

const email =
document.getElementById("email")
.value
.trim()
.toLowerCase();

const password =
document.getElementById("password")
.value;

const res =
await fetch(API + "/login",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
email,
password
})

});

const data = await res.json();

if(data.error){

document.getElementById("authStatus")
.innerText = data.error;

return;
}

sessionStorage.setItem(
"auth_session",
data.session
);

session = data.session;

await loadDashboard();
await loadProfile();
}


// =========================
// FRONTIER
// =========================

async function connectFrontier(){

const res =
await fetch(API + "/frontier/start",{

headers:{
Authorization:"Bearer " + session
}

});

const data = await res.json();

if(data.error){

document.getElementById("dashStatus")
.innerText = data.error;

return;
}

location.href = data.url;
}


// =========================
// LOGOUT
// =========================

function logout(){

sessionStorage.removeItem(
"auth_session"
);

location.reload();
}

</script>

</body>
</html>
