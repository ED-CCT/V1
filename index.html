<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ED-CCT</title>

<style>
body{
margin:0;
background:#0b0f1a;
color:#e6edf3;
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
text-align:center;
}

.container{max-width:900px;padding:40px;}

h1{color:#ff9800;font-size:48px;}
h2{color:#9fb3c8;font-weight:normal;}

.card{
margin-top:25px;
padding:25px;
border:1px solid #253041;
border-radius:12px;
background:#111827;
}

input{
width:100%;
padding:12px;
margin-top:10px;
background:#1b2535;
border:none;
color:white;
border-radius:8px;
}

button{
margin-top:15px;
padding:12px 18px;
border:none;
border-radius:8px;
cursor:pointer;
background:#ff9800;
font-weight:bold;
}

.secondary{background:#253041;color:white;}

.hidden{display:none;}

.status{margin-top:15px;color:#ff9800;}

.small{
color:#9fb3c8;
font-size:14px;
}

pre{
text-align:left;
background:#0b0f1a;
padding:15px;
border-radius:8px;
overflow:auto;
}

.flex{
display:flex;
gap:15px;
flex-wrap:wrap;
}

.half{
flex:1;
min-width:300px;
text-align:left;
}

.box{
padding:12px;
margin-top:10px;
background:#0b0f1a;
border-radius:8px;
border:1px solid #1f2a3a;
}
</style>
</head>

<body>

<div class="container">

<h1>ED-CCT</h1>
<h2>Elite Dangerous Tracker</h2>

<!-- LOGIN -->
<div id="authBox" class="card">

<h3>Login / Register</h3>

<input id="email" placeholder="Email"/>
<input id="password" type="password" placeholder="Password"/>

<button onclick="register()">Register</button>
<button class="secondary" onclick="login()">Login</button>

<div id="authStatus" class="status"></div>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="card hidden">

<h3>Commander Dashboard</h3>

<p id="userEmail" class="small"></p>

<p id="frontierStatus">Checking Frontier...</p>

<button onclick="connectFrontier()">Connect Frontier</button>
<button class="secondary" onclick="logout()">Logout</button>

<div id="dashStatus" class="status"></div>

</div>

<!-- PROFILE -->
<div id="profileBox" class="card hidden">

<h3>Frontier Profile</h3>

<div class="flex">

<div class="half">
<h4>Raw JSON</h4>
<pre id="journalData">Loading...</pre>
</div>

<div class="half">
<h4>Structured View</h4>
<div id="profileUI"></div>
</div>

</div>

</div>

</div>

<script>

const API =
"https://elite-oauth.edcolonycommoditiestracker.workers.dev";

let session = null;

// =========================
// INIT
// =========================

async function init(){

session = sessionStorage.getItem("auth_session");

if(!session) return;

await loadDashboard();
await loadProfile();
}

init();

// =========================
// DASHBOARD
// =========================

async function loadDashboard(){

const res =
await fetch(API + "/me?session=" + session);

if(!res.ok) return;

const data = await res.json();

if(!data.logged) return;

document.getElementById("authBox").classList.add("hidden");
document.getElementById("dashboard").classList.remove("hidden");

document.getElementById("userEmail").innerText =
"Logged as: " + data.email;

document.getElementById("frontierStatus").innerText =
data.frontier
? "Frontier: CONNECTED ✔"
: "Frontier: NOT CONNECTED ✖";
}

// =========================
// PROFILE
// =========================

async function loadProfile(){

const res =
await fetch(API + "/data?session=" + session);

if(!res.ok) return;

const data = await res.json();

const p = data.profile || {};
const j = data.journal || [];
const f = data.fleetcarrier || {};

document.getElementById("profileBox")
.classList.remove("hidden");

document.getElementById("journalData").innerText =
JSON.stringify(j, null, 2);

document.getElementById("profileUI").innerHTML =
renderProfile(j, f, p);
}

// =========================
// HEX
// =========================

function hexToText(hex){

if(!hex) return "";

let str = "";

for(let i = 0; i < hex.length; i += 2){

const code =
parseInt(hex.substr(i,2),16);

if(!isNaN(code)){
str += String.fromCharCode(code);
}
}

return str;
}

// =========================
// EVENTS FILTER
// =========================

function getLastEvents(events){

if(!Array.isArray(events)) return [];

const allowed = new Set([
"LoadGame",
"Loadout",
"Cargo"
]);

const map = new Map();

for(const e of events){

if(!e || !allowed.has(e.event)) continue;

if(e.event === "Cargo" && e.Vessel !== "Ship") continue;

map.set(e.event, e);
}

return Array.from(map.values());
}

function renderEvents(events){

if(!events.length){
return "<p>No matching events</p>";
}

return events.map(e => {

if(e.event === "LoadGame"){
return `
<div class="box">
<p><b>Commander:</b> ${e.Commander ?? "-"}</p>
<p><b>Ship:</b> ${e.Ship_Localised ?? "-"}</p>
<p><b>Credits:</b> ${e.Credits ?? 0}</p>
<p><b>Fuel:</b> ${e.FuelLevel ?? 0} / ${e.FuelCapacity ?? 0}</p>
</div>
`;
}

if(e.event === "Loadout"){
return `
<div class="box">
<p><b>Ship ID:</b> ${e.ShipIdent ?? "-"}</p>
<p><b>Hull Value:</b> ${e.HullValue ?? 0}</p>
<p><b>Modules Value:</b> ${e.ModulesValue ?? 0}</p>
<p><b>Cargo Capacity:</b> ${e.CargoCapacity ?? 0}</p>
<p><b>Max Jump Range:</b> ${e.MaxJumpRange ?? 0}</p>
</div>
`;
}

if(e.event === "Cargo"){
return `
<div class="box">
<h4>Cargo</h4>
<p><b>Total Count:</b> ${e.Count ?? 0}</p

${Array.isArray(e.Inventory) && e.Inventory.length ? `

${e.Inventory.map(i => `
<p>
<b>${i.Name ?? "-"}</b> - ${i.Count ?? 0}
</p>
`).join("")}

` : "<p class='small'>No inventory data</p>"}

</div>
`;
}

return "";

}).join("");
}

// =========================
// PROFILE RENDER
// =========================

function renderProfile(j, f, p){

const commander = p.commander || {};
const ship = p.ship || {};
const system = p.lastSystem || {};
const station = p.lastStarport || {};
const squadron = p.squadron || {};

const fcName =
hexToText(f?.name?.vanityName || "");

const cargo =
Array.isArray(f?.cargo) ? f.cargo : [];

const cargoHtml =
cargo.map(c => `
<tr>
<td>${c.locName || c.commodity}</td>
<td>${c.qty ?? 0}</td>
</tr>
`).join("");

const services = f?.market?.services || {};

const selectedServices = {
carrierfuel:"Carrier Fuel",
shipyard:"Shipyard",
outfitting:"Outfitting",
refuel:"Refuel",
repair:"Repair",
rearm:"Rearm"
};

const servicesHtml =
Object.entries(selectedServices)
.map(([key,label]) => {
const value = services[key];
if(value === undefined) return "";
return `<p><b>${label}:</b> ${value}</p>`;
}).join("");

// ✔ ONLY HERE FIX IS IMPORTANT
const events = getLastEvents(j);

const eventsHtml = renderEvents(events);

return `
<div class="box">
<h4>Commander</h4>
<p><b>Name:</b> ${commander.name ?? "-"}</p>
<p><b>Credits:</b> ${Number(commander.credits || 0).toLocaleString()}</p>
<p><b>Alive:</b> ${commander.alive ? "YES" : "NO"}</p>
<p><b>Docked:</b> ${commander.docked ? "YES" : "NO"}</p>
</div>

<div class="box">
<h4>Ship</h4>
<p><b>ID:</b> ${ship.id ?? "-"}</p>
<p><b>Name:</b> ${ship.name ?? "-"}</p>
<p><b>Free:</b> ${ship.free ? "YES" : "NO"}</p>
<p><b>Alive:</b> ${ship.alive ? "YES" : "NO"}</p>
<p><b>Cargo:</b> ${ship.value?.cargo ?? 0}</p>
<p><b>Hull:</b> ${ship.health?.hull ?? 0}</p>
<p><b>Shield:</b> ${ship.health?.shield ?? 0}</p>
<p><b>Shield Up:</b> ${ship.health?.shieldup ? "YES" : "NO"}</p>
<p><b>Cockpit Breached:</b> ${ship.cockpitBreached ? "YES" : "NO"}</p>
<p><b>Oxygen:</b> ${ship.oxygenRemaining ?? 0}</p>
</div>

<div class="box">
${eventsHtml}
</div>
`;
}

// =========================
// AUTH
// =========================

async function register(){

const email =
document.getElementById("email").value.trim().toLowerCase();

const password =
document.getElementById("password").value;

const res = await fetch(API + "/register",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({email,password})
});

const data = await res.json();

document.getElementById("authStatus").innerText =
data.error || "Account created ✔";
}

async function login(){

const email =
document.getElementById("email").value.trim().toLowerCase();

const password =
document.getElementById("password").value;

const res = await fetch(API + "/login",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({email,password})
});

const data = await res.json();

if(data.error){
document.getElementById("authStatus").innerText = data.error;
return;
}

sessionStorage.setItem("auth_session",data.session);
session = data.session;

await loadDashboard();
await loadProfile();
}

// =========================
// FRONTIER
// =========================

async function connectFrontier(){

const res = await fetch(API + "/frontier/start",{
headers:{ Authorization:"Bearer " + session }
});

const data = await res.json();

if(data.error){
document.getElementById("dashStatus").innerText = data.error;
return;
}

location.href = data.url;
}

// =========================
// LOGOUT
// =========================

function logout(){
sessionStorage.removeItem("auth_session");
location.reload();
}

</script>

</body>
</html>
