<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ED-CCT</title>

<style>
body{
margin:0;
background:#0b0f1a;
color:#e6edf3;
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
text-align:center;
}

.container{max-width:900px;padding:40px;}

h1{color:#ff9800;font-size:48px;}
h2{color:#9fb3c8;font-weight:normal;}

.card{
margin-top:25px;
padding:25px;
border:1px solid #253041;
border-radius:12px;
background:#111827;
}

input{
width:100%;
padding:12px;
margin-top:10px;
background:#1b2535;
border:none;
color:white;
border-radius:8px;
}

button{
margin-top:15px;
padding:12px 18px;
border:none;
border-radius:8px;
cursor:pointer;
background:#ff9800;
font-weight:bold;
}

.secondary{background:#253041;color:white;}

.hidden{display:none;}

.status{margin-top:15px;color:#ff9800;}

.small{
color:#9fb3c8;
font-size:14px;
}

pre{
text-align:left;
background:#0b0f1a;
padding:15px;
border-radius:8px;
overflow:auto;
}

.flex{
display:flex;
gap:15px;
flex-wrap:wrap;
}

.half{
flex:1;
min-width:300px;
text-align:left;
}

.box{
padding:12px;
margin-top:10px;
background:#0b0f1a;
border-radius:8px;
border:1px solid #1f2a3a;
}
hr{
border:none;
border-top:1px solid #253041;
margin:15px 0;
}

h4{
color:#ff9800;
margin-bottom:10px;
}

#profileUI{
display:flex;
flex-direction:column;
gap:15px;
}
</style>
</head>

<body>

<div class="container">

<h1>ED-CCT</h1>
<h2>Elite Dangerous Tracker</h2>

<div id="authBox" class="card">
<h3>Login / Register</h3>

<input id="email" placeholder="Email"/>
<input id="password" type="password" placeholder="Password"/>

<button onclick="register()">Register</button>
<button class="secondary" onclick="login()">Login</button>

<div id="authStatus" class="status"></div>
</div>

<div id="dashboard" class="card hidden">
<h3>Commander Dashboard</h3>

<p id="userEmail" class="small"></p>

<p id="frontierStatus">Checking Frontier...</p>

<button onclick="connectFrontier()">Connect Frontier</button>
<button class="secondary" onclick="logout()">Logout</button>

<div id="dashStatus" class="status"></div>
</div>

<div id="profileBox" class="card hidden">
<h3>Frontier Profile</h3>

<div class="flex">

<div class="half">
<h4>Raw JSON</h4>
<pre id="journalData">Loading...</pre>
</div>

<div class="half">
<h4>Structured View</h4>
<div id="profileUI"></div>
</div>

</div>
</div>

</div>

<script>

const API = "https://elite-oauth.edcolonycommoditiestracker.workers.dev";

let session = null;

// INIT
async function init(){
session = sessionStorage.getItem("auth_session");
if(!session) return;

await loadDashboard();
await loadProfile();
}
init();

// DASHBOARD
async function loadDashboard(){
const res = await fetch(API + "/me?session=" + session);
if(!res.ok) return;

const data = await res.json();
if(!data.logged) return;

document.getElementById("authBox").classList.add("hidden");
document.getElementById("dashboard").classList.remove("hidden");

document.getElementById("userEmail").innerText =
"Logged as: " + data.email;

document.getElementById("frontierStatus").innerText =
data.frontier ? "Frontier: CONNECTED ✔" : "Frontier: NOT CONNECTED ✖";
}



// HEX helper
function hexToText(hex){
if(!hex) return "";

let str = "";

for(let i = 0; i < hex.length; i += 2){
const code = parseInt(hex.substr(i,2),16);
if(!isNaN(code)){
str += String.fromCharCode(code);
}
}

return str;
}
async function loadProfile(){

const res = await fetch(API + "/data?session=" + session);
if(!res.ok) return;

const data = await res.json();

document.getElementById("profileBox").classList.remove("hidden");

document.getElementById("journalData").innerText =
JSON.stringify(data, null, 2);

// EVENTS
const events = Array.isArray(data.events)
? data.events
: [];

const locationEvent =
events.find(e => e.Event === "Location") || {};

const loadGameEvent =
events.find(e => e.Event === "LoadGame") || {};

const loadoutEvent =
events.find(e => e.Event === "Loadout") || {};

const cargoEvent =
events.find(e => e.Event === "Cargo") || {};

// COMMANDER
const commanderHTML = `

<div class="box">

<h4>Commander</h4>

<p><b>Name:</b> ${data.commander?.name || "-"}</p>

<p>
<b>Squadron:</b>
${data.squadron?.name || "-"}
[${data.squadron?.tag || "-"}]
</p>

<p><b>Rank:</b> ${data.squadron?.rank || "-"}</p>

<p><b>Credits:</b> ${
Number(data.commander?.credits || 0).toLocaleString()
}</p>

<p><b>Alive:</b> ${
data.ship?.alive ? "YES" : "NO"
}</p>

<hr>

<p><b>System:</b> ${locationEvent.StarSystem || "-"}</p>

<p><b>Security:</b> ${
locationEvent.SystemSecurity_Localised || "-"
}</p>

<p><b>Body:</b> ${locationEvent.Body || "-"}</p>

<p><b>Station Type:</b> ${
locationEvent.StationType || "-"
}</p>

<p><b>Station:</b> ${
locationEvent.StationName || "-"
}</p>

<hr>

<p><b>Game Mode:</b> ${
loadGameEvent.GameMode || "-"
}</p>

<p><b>Ship:</b> ${
loadGameEvent.Ship_Localised || "-"
}</p>

<hr>

<p>
<b>Ship Name:</b>
${loadoutEvent.ShipName || "-"}
-
${loadoutEvent.ShipIdent || "-"}
</p>

<p><b>Hull:</b> ${
Math.round((loadoutEvent.HullHealth || 0) * 100)
}%</p>

<p><b>Shield:</b> ${
data.ship?.health?.shield || 0
}%</p>

<p><b>Docked:</b> ${
data.commander?.docked ? "YES" : "NO"
}</p>

<p><b>Cockpit Breached:</b> ${
data.ship?.cockpitBreached ? "YES" : "NO"
}</p>

<p><b>Oxygen:</b> ${
data.ship?.oxygenRemaining || 0
}</p>

<p>
<b>Fuel:</b>
${loadGameEvent.FuelLevel || 0}
/
${loadGameEvent.FuelCapacity || 0}
</p>

<p><b>Jump Range:</b> ${
loadoutEvent.MaxJumpRange || 0
}</p>

<p>
<b>Cargo:</b>
${cargoEvent.Count || 0}
/
${loadoutEvent.CargoCapacity || 0}
</p>

</div>
`;

// CARGO
const cargoHTML = `

<div class="box">

<h4>Ship Cargo</h4>

${
Array.isArray(cargoEvent.Inventory)
? cargoEvent.Inventory.map(i => `
<div class="box">
<b>${i.Name}</b><br>
Qty: ${i.Count}
</div>
`).join("")
: "No Cargo"
}

</div>
`;

// FLEET CARRIER
const fc = data.fleetcarrier || {};

const usedCargo =
(fc.capacity?.cargoForSale || 0)
+
(fc.capacity?.cargoNotForSale || 0);

const totalCargo =
usedCargo
+
(fc.capacity?.freeSpace || 0);

const fleetHTML = `

<div class="box">

<h4>Fleet Carrier</h4>

<p>
<b>Name:</b>
${hexToText(fc.name?.filteredVanityName || "")}
-
${fc.name?.callsign || "-"}
</p>

<p><b>Balance:</b> ${
Number(fc.balance || 0).toLocaleString()
}</p>

<p><b>System:</b> ${
fc.currentStarSystem || "-"
}</p>

<p><b>Docking:</b> ${
fc.dockingAccess || "-"
}</p>

<p><b>Notorious Access:</b> ${
fc.notoriousAccess ? "YES" : "NO"
}</p>

<hr>

<p><b>Refuel:</b> ${
fc.market?.services?.refuel || "-"
}</p>

<p><b>Repair:</b> ${
fc.market?.services?.repair || "-"
}</p>

<p><b>Rearm:</b> ${
fc.market?.services?.rearm || "-"
}</p>

<p><b>Shipyard:</b> ${
fc.market?.services?.shipyard || "-"
}</p>

<p><b>Outfitting:</b> ${
fc.market?.services?.outfitting || "-"
}</p>

<hr>

<p>
<b>Carrier Cargo:</b>
${usedCargo}
/
${totalCargo}
</p>

</div>
`;

// FLEET CARGO
const fleetCargoHTML = `

<div class="box">

<h4>Fleet Carrier Cargo</h4>

${
Array.isArray(fc.cargo)
? fc.cargo.map(i => `
<div class="box">
<b>${i.commodity}</b><br>
Qty: ${i.qty}
</div>
`).join("")
: "No Cargo"
}

</div>
`;

// RENDER
document.getElementById("profileUI").innerHTML = `
${commanderHTML}
${cargoHTML}
${fleetHTML}
${fleetCargoHTML}
`;

}
// AUTH
async function register(){
const email = document.getElementById("email").value.trim().toLowerCase();
const password = document.getElementById("password").value;

const res = await fetch(API + "/register",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({email,password})
});

const data = await res.json();
document.getElementById("authStatus").innerText =
data.error || "Account created ✔";
}

async function login(){
const email = document.getElementById("email").value.trim().toLowerCase();
const password = document.getElementById("password").value;

const res = await fetch(API + "/login",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({email,password})
});

const data = await res.json();

if(data.error){
document.getElementById("authStatus").innerText = data.error;
return;
}

sessionStorage.setItem("auth_session", data.session);
session = data.session;

await loadDashboard();
await loadProfile();
}

// FRONTIER
async function connectFrontier(){
const res = await fetch(API + "/frontier/start",{
headers:{ Authorization:"Bearer " + session }
});

const data = await res.json();

if(data.error){
document.getElementById("dashStatus").innerText = data.error;
return;
}

location.href = data.url;
}

// LOGOUT
function logout(){
sessionStorage.removeItem("auth_session");
location.reload();
}

</script>

</body>
</html>
