<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta
  name="viewport"
  content="width=device-width, initial-scale=1.0"
/>

<title>ED-CCT</title>

<style>

body{
  margin:0;
  background:#0b0f1a;
  color:#e6edf3;
  font-family:Arial;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  text-align:center;
}

.container{
  max-width:900px;
  padding:40px;
  width:100%;
  box-sizing:border-box;
}

h1{
  color:#ff9800;
  font-size:48px;
}

h2{
  color:#9fb3c8;
  font-weight:normal;
}

.card{
  margin-top:25px;
  padding:25px;
  border:1px solid #253041;
  border-radius:12px;
  background:#111827;
}

input{
  width:100%;
  padding:12px;
  margin-top:10px;
  background:#1b2535;
  border:none;
  color:white;
  border-radius:8px;
  box-sizing:border-box;
}

button{
  margin-top:15px;
  padding:12px 18px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  background:#ff9800;
  font-weight:bold;
}

.secondary{
  background:#253041;
  color:white;
}

.hidden{
  display:none;
}

.status{
  margin-top:15px;
  color:#ff9800;
}

.small{
  color:#9fb3c8;
  font-size:14px;
}

pre{
  text-align:left;
  background:#0b0f1a;
  padding:15px;
  border-radius:8px;
  overflow:auto;
}

.flex{
  display:flex;
  gap:15px;
  flex-wrap:wrap;
}

.half{
  flex:1;
  min-width:300px;
  text-align:left;
}

.box{
  padding:12px;
  margin-top:10px;
  background:#0b0f1a;
  border-radius:8px;
  border:1px solid #1f2a3a;
}

hr{
  border:none;
  border-top:1px solid #253041;
  margin:15px 0;
}

h4{
  color:#ff9800;
  margin-bottom:10px;
}

#profileUI{
  display:flex;
  flex-direction:column;
  gap:15px;
}

.loading{
  opacity:0.7;
  poer-events:none;
}

</style>
</head>

<body>

<div class="container">

<h1>ED-CCT</h1>
<h2>Elite Dangerous Tracker</h2>

<div id="authBox" class="card">

  <h3>Login / Register</h3>

  <input
    id="email"
    type="email"
    placeholder="Email"
    autocomplete="email"
  />

  <input
    id="password"
    type="password"
    placeholder="Password"
    autocomplete="current-password"
  />

  <button onclick="register()">
    Register
  </button>

  <button
    class="secondary"
    onclick="login()"
  >
    Login
  </button>

  <div
    id="authStatus"
    class="status"
  ></div>

</div>

<div
  id="dashboard"
  class="card hidden"
>

  <h3>Commander Dashboard</h3>

  <p
    id="userEmail"
    class="small"
  ></p>

  <p id="frontierStatus">
    Checking Frontier...
  </p>

  <button onclick="connectFrontier()">
    Connect Frontier
  </button>

  <button
    class="secondary"
    onclick="logout()"
  >
    Logout
  </button>

  <div
    id="dashStatus"
    class="status"
  ></div>

</div>

<div
  id="profileBox"
  class="card hidden"
>

  <h3>Frontier Profile</h3>

  <div class="flex">

    <div class="half">

      <h4>Structured View</h4>

      <div id="profileUI"></div>

    </div>

    <div class="half">

      <h4>manual</h4>

      <button onclick="ManualColonisationSystemClaimSynch()">
        Manual
      </button>

      <pre id="manual"></pre>

    </div>

  </div>

</div>

</div>

<script>

const API =
"https://elite-oauth.edcolonycommoditiestracker.workers.dev";
let session = null;

// ================= SAFE FETCH =================

async function apiFetch(path, options = {}){

  const opts = {
    credentials:"include",
    ...options
  };
  opts.headers = {
  ...(options.headers || {})
};

  if(session){
    opts.headers.Authorization =
      "Bearer " + session;
  }

  const res = await fetch(API + path, opts);

  if(res.status === 401){

    sessionStorage.removeItem("auth_session");
    session = null;

    document
      .getElementById("dashboard")
      .classList.add("hidden");

    document
      .getElementById("profileBox")
      .classList.add("hidden");

    document
      .getElementById("authBox")
      .classList.remove("hidden");
  }

  return res;
}

// ================= INIT =================

async function init(){

  session =
    sessionStorage.getItem("auth_session");

  const dashboard =
    await loadDashboard();

  if(dashboard?.frontier){
    await loadProfile();
  }

}

// ================= DASHBOARD =================

async function loadDashboard(){

  const res = await apiFetch("/me");

  if(!res.ok){
    return false;
  }

  const data = await res.json();

  if(!data.logged){
    return false;
  }

  document
    .getElementById("authBox")
    .classList.add("hidden");

  document
    .getElementById("dashboard")
    .classList.remove("hidden");

  document
    .getElementById("userEmail")
    .innerText =
      "Logged as: " + data.email;

  document
    .getElementById("frontierStatus")
    .innerText =
      data.frontier
        ? "Frontier: CONNECTED ✔"
        : "Frontier: NOT CONNECTED ✖";

  return data;
}

// ================= HEX =================

function hexToText(hex){

  if(!hex) return "";

  let str = "";

  for(let i=0;i<hex.length;i+=2){

    const code =
      parseInt(hex.substr(i,2),16);

    if(!isNaN(code)){
      str += String.fromCharCode(code);
    }
  }

  return str;
}

// ================= PROFILE =================

async function loadProfile(){

  const res = await apiFetch("/data");

  if(!res.ok) return;

  const data = await res.json();

  document
    .getElementById("profileBox")
    .classList.remove("hidden");

  // EVENTS

  const events =
    Array.isArray(data.events)
      ? data.events
      : [];

  const locationEvent =
    events.find(
      e =>
        e.event === "Location" ||
        e.Event === "Location"
    ) || {};

  const loadGameEvent =
    events.find(
      e =>
        e.event === "LoadGame" ||
        e.Event === "LoadGame"
    ) || {};

  const loadoutEvent =
    events.find(
      e =>
        e.event === "Loadout" ||
        e.Event === "Loadout"
    ) || {};

  const cargoEvent =
    events.find(
      e =>
        e.event === "Cargo" ||
        e.Event === "Cargo"
    ) || {};

  // COMMANDER

  const commanderHTML = `

<div class="box">

<h4>Commander</h4>

<p>
<b>Name:</b>
${data.commander?.name || "NO DATA"}
</p>

<p>
<b>Squadron:</b>
${data.squadron?.name || "NO DATA"}
[${data.squadron?.tag || ""}]
</p>

<p>
<b>Rank:</b>
${data.squadron?.rank || "NO DATA"}
</p>

<p>
<b>Credits:</b>
${
typeof data.commander?.credits === "number"
? data.commander.credits.toLocaleString()
: "NO DATA"
}
</p>

<p>
<b>Alive:</b>
${data.ship?.alive ? "YES" : "NO"}
</p>

<hr>

<p>
<b>System:</b>
${locationEvent.StarSystem || "NO DATA"}
</p>

<p>
<b>Security:</b>
${locationEvent.SystemSecurity_Localised || "NO DATA"}
</p>

<p>
<b>Body:</b>
${locationEvent.Body || "NO DATA"}
</p>

<p>
<b>Station Type:</b>
${locationEvent.StationType || "NO DATA"}
</p>

<p>
<b>Station:</b>
${locationEvent.StationName || "NO DATA"}
</p>

<hr>

<p>
<b>Game Mode:</b>
${loadGameEvent.GameMode || "NO DATA"}
</p>

<p>
<b>Ship:</b>
${loadGameEvent.Ship_Localised || "NO DATA"}
</p>

<hr>

<p>
<b>Ship Name:</b>
${loadoutEvent.ShipName || ""}
-
${loadoutEvent.ShipIdent || "NO DATA"}
</p>

<p>
<b>Hull:</b>
${
typeof loadoutEvent.HullHealth === "number"
? Math.round(loadoutEvent.HullHealth * 100) + "%"
: "NO DATA"
}
</p>

<p>
<b>Shield:</b>
${
typeof data.ship?.health?.shield === "number"
? data.ship.health.shield + "%"
: "NO DATA"
}
</p>

<p>
<b>Docked:</b>
${data.commander?.docked ? "YES" : "NO"}
</p>

<p>
<b>Cockpit Breached:</b>
${data.ship?.cockpitBreached ? "YES" : "NO"}
</p>

<p>
<b>Oxygen:</b>
${data.ship?.oxygenRemaining || "NO DATA"}
</p>

<p>
<b>Fuel:</b>
${
loadGameEvent.FuelLevel != null &&
loadGameEvent.FuelCapacity != null
? `${loadGameEvent.FuelLevel} / ${loadGameEvent.FuelCapacity}`
: "NO DATA"
}
</p>

<p>
<b>Jump Range:</b>
${loadoutEvent.MaxJumpRange || "NO DATA"}
</p>

<p>
<b>Cargo:</b>
${
cargoEvent.Count != null &&
loadoutEvent.CargoCapacity != null
? `${cargoEvent.Count} / ${loadoutEvent.CargoCapacity}`
: "NO DATA"
}
</p>

</div>
`;

  // CARGO

  const cargoHTML = `

<div class="box">

<h4>Ship Cargo</h4>

${
Array.isArray(cargoEvent.Inventory)
? cargoEvent.Inventory.map(i => `
<div class="box">
<b>${i.Name}</b>: ${i.Count}
</div>
`).join("")
: "NO DATA"
}

</div>
`;

  // FLEET

  const fc = data.fleetcarrier || {};

  const cargoForSale =
    fc.capacity?.cargoForSale;

  const cargoNotForSale =
    fc.capacity?.cargoNotForSale;

  const freeSpace =
    fc.capacity?.freeSpace;

  const usedCargo =
    typeof cargoForSale === "number" &&
    typeof cargoNotForSale === "number"
      ? cargoForSale + cargoNotForSale
      : null;

  const totalCargo =
    usedCargo !== null &&
    typeof freeSpace === "number"
      ? usedCargo + freeSpace
      : null;

  const fleetHTML = `

<div class="box">

<h4>Fleet Carrier</h4>

<p>
<b>Name:</b>
${hexToText(fc.name?.filteredVanityName || "")}
-
${fc.name?.callsign || ""}
</p>

<p>
<b>Balance:</b>
${
isFinite(fc.balance)
? Number(fc.balance).toLocaleString()
: "NO DATA"
}
</p>

<p>
<b>System:</b>
${fc.currentStarSystem || "NO DATA"}
</p>

<p>
<b>Docking:</b>
${fc.dockingAccess || "NO DATA"}
</p>

<p>
<b>Notorious Access:</b>
${fc.notoriousAccess ? "YES" : "NO"}
</p>

<hr>

<p>
<b>Refuel:</b>
${fc.market?.services?.refuel || "NO DATA"}
</p>

<p>
<b>Repair:</b>
${fc.market?.services?.repair || "NO DATA"}
</p>

<p>F
<b>Rearm:</b>
${fc.market?.services?.rearm || "NO DATA"}F
</p>

<p>
<b>Shipyard:</b>
${fc.market?.services?.shipyard || "NO DATA"}
</p>

<p>
<b>Outfitting:</b>
${fc.market?.services?.outfitting || "NO DATA"}
</p>

<hr>

<p>
<b>Carrier Cargo:</b>
${
usedCargo !== null &&
totalCargo !== null
? `${usedCargo} / ${totalCargo}`
: "NO DATA"
}
</p>

</div>
`;

  // FC CARGO

  const fleetCargoHTML = `

<div class="box">

<h4>Fleet Carrier Cargo</h4>

${
Array.isArray(fc.cargo)
? fc.cargo.map(i => `
<div class="box">
<b>${i.commodity}</b>: ${i.qty}
</div>
`).join("")
: "NO DATA"
}

</div>
`;

  // RENDER

  document
    .getElementById("profileUI")
    .innerHTML =
      commanderHTML +
      cargoHTML +
      fleetHTML +
      fleetCargoHTML;
}

// ================= MANUAL =================

async function ManualColonisationSystemClaimSynch(){

  const btn = event.target;

  btn.classList.add("loading");

  try{

    const res = await apiFetch(
      "/ManualColonisationSystemClaimSynch"
    );

    if(!res.ok){

      document
        .getElementById("manual")
        .innerText =
          "ERROR " + res.status;

      return;
    }

    const data = await res.json();

    document
      .getElementById("manual")
      .innerText =
        JSON.stringify(data,null,2);

  }finally{

    btn.classList.remove("loading");
  }
}

// ================= REGISTER =================

async function register(){

  const email =
    document
      .getElementById("email")
      .value
      .trim()
      .toLowerCase();

  const password =
    document
      .getElementById("password")
      .value;

  const res = await apiFetch(
    "/register",
    {
      method:"POST",
      headers:{
        "Content-Type":"application/json"
      },
      body:JSON.stringify({
        email,
        password
      })
    }
  );

  const data = await res.json();

  document
    .getElementById("authStatus")
    .innerText =
      data.error ||
      "Account created ✔";
}

// ================= LOGIN =================

async function login(){

  const email =
    document
      .getElementById("email")
      .value
      .trim()
      .toLowerCase();

  const password =
    document
      .getElementById("password")
      .value;

  const res = await apiFetch(
    "/login",
    {
      method:"POST",
      headers:{
        "Content-Type":"application/json"
      },
      body:JSON.stringify({
        email,
        password
      })
    }
  );

  const data = await res.json();

  if(data.error){
    document
      .getElementById("authStatus")
      .innerText =
        data.error;
    return;
  }
  sessionStorage.setItem(
    "auth_session",
    data.session
  );
  session = data.session;
  const dashboard =
  await loadDashboard();

if(dashboard?.frontier){
  await loadProfile();
}
}

// ================= FRONTIER =================

async function connectFrontier(){

  const res = await apiFetch(
  "/frontier/start",
  {
    method:"POST"
  }
);

  const data = await res.json();

  if(data.error){

    document
      .getElementById("dashStatus")
      .innerText =
        data.error;

    return;
  }

  location.href = data.url;
}

// ================= LOGOUT =================

async function logout(){

  await apiFetch(
    "/logout",
    {
      method:"POST"
    }
  );

  location.reload();
}
init();
</script>

</body>
</html>
